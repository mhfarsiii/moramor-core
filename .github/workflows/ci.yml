name: Core CI/CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'apps/core/**'
      - 'prisma/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/core/**'
      - 'prisma/**'
      - '.github/workflows/ci.yml'

env:
  NODE_VERSION: '22'
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/moramor-core

jobs:
  tests:
    name: Lint & tests (unit + e2e)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: docker.arvancloud.ir/postgres:15-alpine
        env:
          POSTGRES_USER: moramor
          POSTGRES_PASSWORD: moramor123
          POSTGRES_DB: moramor_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U moramor -d moramor_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: docker.arvancloud.ir/redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://moramor:moramor123@localhost:5432/moramor_db?schema=public
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      NODE_ENV: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Prisma migrations
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Run e2e tests
        run: npm run test:e2e

  build:
    name: Build & push Docker image
    needs: tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    name: Deploy to production
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USERNAME }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /root/project-core

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker pull ${{ env.IMAGE_NAME }}:${{ github.sha }}

            CORE_TAG=${{ github.sha }} docker compose up -d --force-recreate --no-deps core

            docker compose exec -T core npx prisma migrate deploy

            docker image prune -f
